<!DOCTYPE html>
<html lang="pt-BR" data-app-shell="play">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jogar — região procedural</title>
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/character-selector.css" />
    <link rel="stylesheet" href="css/attack-wheel.css" />
  </head>
  <body>
    <div class="app">
      <div id="character-selector-container"></div>
      <h1 class="play-shell-title">Explorar região</h1>

      <div class="toolbar play-shell-toolbar">
        <div class="field">
          <label for="seed">Seed</label>
          <input type="text" id="seed" value="demo" autocomplete="off" spellcheck="false" />
        </div>
        <button type="button" id="generate">Gerar</button>
        <button type="button" id="btnBackToMap" class="btn-secondary hidden">Voltar ao mapa</button>
        <a href="debug-play.html" class="btn-secondary" style="display:inline-flex;align-items:center;padding:0.45rem 0.8rem;text-decoration:none;border-radius:6px;">Ferramentas / debug</a>
        <a href="index.html" class="btn-secondary" style="display:inline-flex;align-items:center;padding:0.45rem 0.8rem;text-decoration:none;border-radius:6px;">Início</a>
      </div>

      <div class="map-wrap">
        <div id="hud-info">Gere o mundo e clique no mapa para entrar no modo jogo.</div>
        <div id="play-immersive-hint" class="play-immersive-hint" aria-live="polite" aria-label="Context actions"></div>
        <canvas id="map" width="512" height="512" aria-label="Mapa e jogo"></canvas>
        <div id="minimap-panel" class="minimap-panel hidden">
          <div id="minimap-audio-popover" class="minimap-audio-popover hidden" role="dialog" aria-label="Volume e música">
            <div class="minimap-audio-popover__row">
              <label class="minimap-audio-popover__label" for="minimap-mix-bgm">BGM</label>
              <input type="range" id="minimap-mix-bgm" class="minimap-audio-popover__range" min="0" max="100" step="1" value="100" />
            </div>
            <div class="minimap-audio-popover__row">
              <label class="minimap-audio-popover__label" for="minimap-mix-sfx">SFX</label>
              <input type="range" id="minimap-mix-sfx" class="minimap-audio-popover__range" min="0" max="100" step="1" value="100" />
            </div>
            <div class="minimap-audio-popover__row minimap-audio-popover__check-row">
              <input type="checkbox" id="minimap-audio-mute" />
              <label class="minimap-audio-popover__check-label" for="minimap-audio-mute">Mute</label>
            </div>
            <div class="minimap-audio-popover__row minimap-audio-popover__check-row">
              <input type="checkbox" id="minimap-bgm-toast-suppress" />
              <label class="minimap-audio-popover__check-label" for="minimap-bgm-toast-suppress">Não mostrar aviso ao trocar a música</label>
            </div>
            <div class="minimap-audio-popover__now" aria-live="polite">
              <div class="minimap-audio-popover__now-title">Música</div>
              <div id="minimap-audio-track" class="minimap-audio-popover__track"></div>
              <div id="minimap-audio-status" class="minimap-audio-popover__status"></div>
            </div>
          </div>
          <header class="minimap-panel__header">
            <span class="minimap-panel__title">Região</span>
            <div class="minimap-panel__header-actions">
              <button
                type="button"
                id="minimap-zoom-btn"
                class="minimap-panel__zoom-btn"
                title="Alterar zoom do minimapa"
                aria-label="Alterar zoom do minimapa"
              >
                <svg class="minimap-panel__zoom-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <circle cx="11" cy="11" r="8"/>
                  <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                  <line x1="11" y1="8" x2="11" y2="14"/>
                  <line x1="8" y1="11" x2="14" y2="11"/>
                </svg>
              </button>
              <button
                type="button"
                id="minimap-help-toggle"
                class="minimap-panel__help-btn"
                title="Ajuda — controles e interface"
                aria-label="Ajuda — controles e interface"
                aria-pressed="false"
              >
                <svg class="minimap-panel__help-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                  <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                </svg>
              </button>
              <button
                type="button"
              <button
                type="button"
                id="minimap-time-weather-toggle"
                class="minimap-panel__time-btn"
                title="World time and weather"
                aria-label="World time and weather"
                aria-pressed="false"
              >
                <svg class="minimap-panel__time-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <circle cx="12" cy="12" r="10"/>
                  <polyline points="12 6 12 12 16 14"/>
                </svg>
              </button>
              <button
                type="button"
                id="minimap-social-toggle"
                class="minimap-panel__social-btn"
                title="Social actions (numpad)"
                aria-label="Social actions (numpad)"
                aria-pressed="false"
              >
                <svg class="minimap-panel__social-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <rect x="3" y="3" width="7" height="7"/>
                  <rect x="14" y="3" width="7" height="7"/>
                  <rect x="14" y="14" width="7" height="7"/>
                  <rect x="3" y="14" width="7" height="7"/>
                </svg>
              </button>
              <button
                type="button"
                id="minimap-audio-toggle"
                class="minimap-panel__music-btn"
                title="Volume BGM e gritos"
                aria-label="Volume BGM e gritos"
                aria-pressed="false"
              >
                <svg
                  class="minimap-panel__music-icon"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path d="M9 18V5l12-2v13" />
                  <circle cx="6" cy="18" r="3" />
                  <circle cx="18" cy="16" r="3" />
                </svg>
              </button>
              <button
                type="button"
                id="minimap-back-to-map"
                class="minimap-panel__back-btn"
                title="Voltar ao mapa global"
                aria-label="Voltar ao mapa global"
              >
                <svg
                  class="minimap-panel__back-icon"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <polyline points="15 3 21 3 21 9" />
                  <polyline points="9 21 3 21 3 15" />
                  <line x1="21" y1="3" x2="14" y2="10" />
                  <line x1="3" y1="21" x2="10" y2="14" />
                </svg>
              </button>
            </div>
          </header>
          <canvas id="minimap" width="192" height="192" data-zoom="close" aria-label="Minimapa da região"></canvas>

          <div id="minimap-time-weather-popover" class="minimap-time-weather-popover hidden" role="dialog" aria-label="Tempo e clima">
            <div id="play-world-time" class="play-world-time" aria-label="World time and weather">
              <div class="play-world-time__section">
                <div class="play-world-time-title">World time</div>
                <div id="play-world-time-phase" class="play-world-time-phase">Day</div>
                <div id="play-world-time-hour" class="play-world-time-hour">12.00 h</div>
                <input type="range" id="play-world-time-slider" min="0" max="24" step="0.05" value="12" />
                <div class="play-world-time-presets">
                  <button type="button" class="play-world-time-preset" id="play-world-preset-dawn">Dawn</button>
                  <button type="button" class="play-world-time-preset" id="play-world-preset-day">Day</button>
                  <button type="button" class="play-world-time-preset" id="play-world-preset-afternoon">Afternoon</button>
                  <button type="button" class="play-world-time-preset" id="play-world-preset-night">Night</button>
                </div>
                <label class="play-world-time-row"><input type="checkbox" id="play-world-time-run" checked /> Advance (realtime)</label>
                <label class="play-world-time-row">Game h / real s <input type="number" id="play-world-time-speed" class="play-world-time-speed" min="0" step="0.01" value="0.02" /></label>
              </div>
              <div id="play-weather" class="play-world-time__section play-weather" aria-label="Weather controls">
                <div class="play-weather-title">Weather</div>
                <div id="play-weather-current" class="play-weather-current">Clear</div>
                <div class="play-weather-presets">
                  <button type="button" class="play-weather-preset is-active" data-weather="clear">Clear</button>
                  <button type="button" class="play-weather-preset" data-weather="cloudy">Cloudy</button>
                  <button type="button" class="play-weather-preset" data-weather="rain">Rain</button>
                  <button type="button" class="play-weather-preset" data-weather="blizzard">Blizzard</button>
                </div>
                <label class="play-weather-row">Intensity
                  <input type="range" id="play-weather-intensity" min="0" max="100" step="1" value="100" />
                </label>
                <button type="button" id="play-weather-lightning" class="play-weather-lightning" title="Force-trigger a ground lightning strike near you">
                  Strike now
                </button>
              </div>
            </div>
          </div>

          <div id="minimap-social-popover" class="minimap-social-popover hidden" role="dialog" aria-label="Ações sociais">
            <div id="character-social-numpad" class="play-social-overlay play-social-overlay--popover social-numpad-box"></div>
          </div>
        </div>
        <div id="play-fps" class="play-fps" aria-live="polite" aria-label="Frames por segundo"></div>
        <div id="play-bgm-now-playing" class="play-bgm-now-playing" aria-live="polite" aria-label="Now playing music">
          <div class="play-bgm-now-playing-title">Now playing</div>
          <div id="play-bgm-now-playing-track" class="play-bgm-now-playing-track">—</div>
          <div id="play-bgm-now-playing-status" class="play-bgm-now-playing-status">Idle</div>
        </div>
        <div id="play-bgm-toast" class="play-bgm-toast" role="dialog" aria-live="polite" aria-label="Troca de música">
          <div class="play-bgm-toast__head">
            <span class="play-bgm-toast-title">Now playing</span>
            <button type="button" id="play-bgm-toast-close" class="play-bgm-toast-close" aria-label="Fechar">×</button>
          </div>
          <div id="play-bgm-toast-track" class="play-bgm-toast-track"></div>
          <div id="play-bgm-toast-status" class="play-bgm-toast-status"></div>
        </div>

      </div>
    </div>

    <div
      id="play-help-wiki-modal"
      class="play-help-wiki hidden"
      role="dialog"
      aria-modal="true"
      aria-hidden="true"
      aria-labelledby="play-help-wiki-title"
    >
      <div class="play-help-wiki__backdrop" aria-hidden="true"></div>
      <div class="play-help-wiki__card">
        <header class="play-help-wiki__header">
          <h1 id="play-help-wiki-title" class="play-help-wiki__title">Ajuda</h1>
          <button type="button" id="play-help-wiki-close" class="play-help-wiki__close" aria-label="Fechar ajuda">×</button>
        </header>
        <div class="play-help-wiki__body">
          <nav id="play-help-wiki-nav" class="play-help-wiki__nav" aria-label="Índice"></nav>
          <div id="play-help-wiki-article" class="play-help-wiki__article"></div>
        </div>
      </div>
    </div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
