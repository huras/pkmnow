<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerador de região — Fase 2</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="app">
      <h1>Gerador procedural</h1>
      <p class="subtitle">Fase 2 — macro-grid (Value Noise), caminhos A* e corredores de rota</p>

      <div class="toolbar">
        <div class="field">
          <label for="seed">Seed</label>
          <input type="text" id="seed" value="demo" autocomplete="off" spellcheck="false" />
        </div>
        <button type="button" id="generate">Gerar</button>
      </div>
      
      <div class="toolbar-secondary">
        <div class="field-group">
          <strong>View:</strong>
          <label class="radio-label"><input type="radio" name="viewType" value="biomes" checked> Biomas</label>
          <label class="radio-label"><input type="radio" name="viewType" value="elevation"> Elevação</label>
          <label class="radio-label"><input type="radio" name="viewType" value="moisture"> Umidade</label>
        </div>
        <div class="field-group">
          <strong>Overlays:</strong>
          <label class="check-label"><input type="checkbox" id="chkRotas" checked> Rotas</label>
          <label class="check-label"><input type="checkbox" id="chkGrafo" checked> Grafo</label>
        </div>
        <button type="button" id="exportBtn" class="btn-secondary">Exportar JSON</button>
        <button type="button" id="btnBackToMap" class="btn-secondary hidden">Voltar ao Mapa</button>
      </div>

      <div class="map-wrap">
        <div id="hud-info">Mova o mouse sobre o mapa para ver os detalhes do terreno</div>
        <canvas id="map" width="512" height="512" aria-label="Pré-visualização do mapa gerado"></canvas>
        <canvas id="minimap" class="hidden" width="128" height="128" aria-label="Minimapa da região"></canvas>
      </div>
    </div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
