<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerador de região — Fase 2</title>
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="app">
      <h1>Gerador procedural</h1>
      <p class="subtitle">Fase 2 — macro-grid (Value Noise), caminhos A* e corredores de rota</p>

      <div class="toolbar">
        <div class="field">
          <label for="seed">Seed</label>
          <input type="text" id="seed" value="demo" autocomplete="off" spellcheck="false" />
        </div>
        <button type="button" id="generate">Gerar</button>
        <button type="button" id="btnSettings" title="Configurações de Ruído" style="background:#2a2a32; width:44px; height:44px; display:flex; align-items:center; justify-content:center; border-radius:8px; border:1px solid #444; cursor:pointer;">⚙️</button>
      </div>
      
      <div class="toolbar-secondary">
        <div class="field-group">
          <strong>View:</strong>
          <label class="radio-label"><input type="radio" name="viewType" value="biomes" checked> Biomas</label>
          <label class="radio-label"><input type="radio" name="viewType" value="elevation"> Elevação</label>
          <label class="radio-label"><input type="radio" name="viewType" value="moisture"> Umidade</label>
        </div>
        <div class="field-group">
          <strong>Overlays:</strong>
          <label class="check-label"><input type="checkbox" id="chkRotas" checked> Rotas</label>
          <label class="check-label"><input type="checkbox" id="chkGrafo" checked> Grafo</label>
          <label class="check-label"><input type="checkbox" id="chkCurvas" checked> Curvas de Nível</label>
        </div>
        <input type="file" id="importFile" class="hidden" accept=".json">
        <button type="button" id="importBtn" class="btn-secondary">Importar JSON</button>
        <button type="button" id="exportBtn" class="btn-secondary">Exportar JSON</button>
        <button type="button" id="btnBackToMap" class="btn-secondary hidden">Voltar ao Mapa</button>
      </div>

      <div class="map-wrap">
        <div id="hud-info">Mova o mouse sobre o mapa para ver os detalhes do terreno</div>
        <canvas id="map" width="512" height="512" aria-label="Pré-visualização do mapa gerado"></canvas>
        <canvas id="minimap" class="hidden" width="128" height="128" aria-label="Minimapa da região"></canvas>
      </div>
      </div>
    </div>

    <!-- Modal de Configurações -->
    <div id="settingsModal" class="modal hidden">
      <div class="modal-content">
        <h3>Configurações do Mundo</h3>
        <div class="config-row">
          <label>Nível do Mar (Land/Water)</label>
          <input type="range" id="cfgWaterLevel" min="20" max="60" value="38">
        </div>
        <div class="config-row">
          <label>Escala Elevação (Coastlines)</label>
          <input type="range" id="cfgElevation" min="10" max="60" value="24">
        </div>
        <div class="config-row">
          <label>Escala Temperatura (Norte/Sul)</label>
          <input type="range" id="cfgTemperature" min="10" max="60" value="32">
        </div>
        <div class="config-row">
          <label>Escala Umidade (Deserto/Planta)</label>
          <input type="range" id="cfgMoisture" min="10" max="60" value="28">
        </div>
        <div class="config-row">
          <label>Corte para Deserto (Umidade)</label>
          <input type="range" id="cfgDesertMoisture" min="10" max="60" value="38">
        </div>
        <div class="config-row">
          <label>Corte para Floresta (Umidade)</label>
          <input type="range" id="cfgForestMoisture" min="40" max="90" value="58">
        </div>
        <div class="config-row">
          <label>Frequência de Anomalias</label>
          <input type="range" id="cfgAnomaly" min="5" max="50" value="20">
        </div>
        <div class="config-row">
          <label>Qtd. Cidades</label>
          <input type="range" id="cfgCities" min="4" max="30" value="14">
        </div>
        <div class="config-row">
          <label>Qtd. Ginásios</label>
          <input type="range" id="cfgGyms" min="2" max="12" value="8">
        </div>
        <div class="modal-footer">
          <button type="button" id="btnApplySettings" class="btn-primary">Aplicar e Gerar</button>
          <button type="button" id="btnCloseSettings" class="btn-secondary">Fechar</button>
        </div>
      </div>
    </div>

    <!-- Play mode: context menu (teleport / debug) -->
    <div id="play-context-menu" class="play-context-menu" hidden aria-hidden="true" role="menu">
      <button type="button" class="play-context-menu-item" id="play-ctx-teleport" role="menuitem">Teleport player here</button>
      <button type="button" class="play-context-menu-item" id="play-ctx-debug" role="menuitem">Debug tile</button>
    </div>

    <!-- Debug Modal (Planet Genesis) -->
    <div id="tile-debug-modal" class="tile-debug-modal" aria-hidden="true">
        <div class="tile-debug-card">
            <div class="tile-debug-header">
                <div class="hud-title" id="tile-debug-title">Raw Data Dump</div>
                <div style="display: flex; gap: 8px;">
                    <button type="button" class="btn-hud" id="tile-debug-copy-json">COPY JSON</button>
                    <button type="button" class="btn-hud" id="tile-debug-close">CLOSE</button>
                </div>
            </div>
            <div class="tile-debug-body" id="tile-debug-content"></div>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
