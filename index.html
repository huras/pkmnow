<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerador de região — Fase 0</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="app">
      <h1>Gerador procedural</h1>
      <p class="subtitle">Fase 0 — canvas, seed determinística, <code>generate</code> + <code>render</code></p>

      <div class="toolbar">
        <div class="field">
          <label for="seed">Seed</label>
          <input type="text" id="seed" value="demo" autocomplete="off" spellcheck="false" />
        </div>
        <button type="button" id="generate">Gerar</button>
      </div>

      <div class="map-wrap">
        <canvas id="map" width="512" height="512" aria-label="Pré-visualização do mapa gerado"></canvas>
      </div>
    </div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
