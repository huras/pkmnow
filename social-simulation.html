<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Social Simulator | Mini-World</title>
    <style>
        :root {
            --bg-color: #0f1218;
            --panel-bg: rgba(25, 30, 45, 0.72);
            --accent-color: #4fccff;
            --text-color: #e0e6ed;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            display: flex;
            height: 100vh;
        }

        #simulator-container {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1a2233 0%, #0f1218 100%);
        }

        canvas {
            background-color: #2d4c2d;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            image-rendering: pixelated;
            cursor: crosshair;
        }

        #sidebar {
            width: 320px;
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            border-left: 1px solid var(--border-color);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 1.25rem;
            margin: 0;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 12px;
        }

        .section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        h2 {
            font-size: 0.9rem;
            margin: 0;
            opacity: 0.7;
            text-transform: uppercase;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 10px 14px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--accent-color);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        button.primary {
            background: var(--accent-color);
            color: #000;
            border: none;
        }

        button.primary:hover {
            opacity: 0.9;
            box-shadow: 0 4px 12px rgba(79, 204, 255, 0.3);
        }

        #log {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 12px;
            font-family: 'Consolas', monospace;
            font-size: 0.8rem;
            overflow-y: auto;
            color: #a0aec0;
        }

        .log-entry {
            margin-bottom: 6px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 4px;
        }

        .badge {
            background: var(--accent-color);
            color: #000;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            margin-right: 6px;
        }

        #tooltip {
            position: absolute;
            background: rgba(10, 15, 25, 0.9);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            pointer-events: none;
            display: none;
            border: 1px solid var(--accent-color);
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="simulator-container">
        <canvas id="main-canvas" width="800" height="600"></canvas>
        <div id="tooltip"></div>
    </div>

    <aside id="sidebar">
        <h1>Social Simulator</h1>
        
        <div class="section">
            <h2>Spawning</h2>
            <div class="btn-group">
                <button id="spawn-bulbasaur">Bulbasaur</button>
                <button id="spawn-charmander">Charmander</button>
                <button id="spawn-pidgey">Pidgey</button>
                <button id="clear-all">Clear All</button>
            </div>
        </div>

        <div class="section">
            <h2>Scenarios</h2>
            <button class="primary" id="trigger-flower">Trigger Flower Discovery</button>
        </div>

        <div class="section">
            <h2>Settings</h2>
            <div style="display: flex; align-items: center; justify-content: space-between;">
                <span>Show Natures</span>
                <input type="checkbox" id="show-natures" checked>
            </div>
        </div>

        <div class="section" style="flex: 1;">
            <h2>Action Log</h2>
            <div id="log">
                <div class="log-entry"><span class="badge">SYS</span>Simulator initialized.</div>
            </div>
        </div>
    </aside>

    <script type="module" src="js/social-simulation.js"></script>
</body>
</html>
